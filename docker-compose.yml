version: "3.9"

services:

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: smartnews
      POSTGRES_USER: smartnews
      POSTGRES_PASSWORD: smartnews
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: always


  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.docker
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.docker
    depends_on:
      - backend
      - redis

  celery_beat:
    build: ./backend
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.docker
    depends_on:
      - backend
      - redis

  telegram_bot:
    build: ./telegram_bot
    command: python main.py
    env_file:
      - ./telegram_bot/.env.docker
    depends_on:
      - backend

volumes:
  postgres_data: